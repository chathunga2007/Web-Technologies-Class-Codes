<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Named Function
        function add(a,b) {
            return a + b;
        }
        console.log(add(5, 2));

        //Stored inside a variable
        const add2 = function(a, b) {
            return a + b;
        }
        console.log(add2(5, 2));

        //Global Scope
        let name = "John";
        function greet() {
            console.log("Hello " + name);
        }
        greet();
        console.log(name);

        //Function Scope
        function text() {
            let age = 30;
            console.log(age);
        }
        text();
        // console.log(age); // Error

        //Block Scope
        if (true) {
            let city = "New York";
            console.log(city);
        }
        // console.log(city); // Error

        //Variable Scope
        if (true) {
            var n = "John";
            console.log(n);
        }
        console.log(n); //work

        //Hoisting
        //1.Hoisting with var
        console.log(x); // undefined
        var x = 5;

        //2.Hoisting with let and const
        //console.log(y); // ReferenceError
        let y = 5;
        console.log(y); // 5

        //Function Hoisting
        greet(); // Hello
        function greet() {
            console.log("Hello");
        }

    </script>
</body>
</html>
