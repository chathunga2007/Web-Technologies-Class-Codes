<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 1 to 20
        for (let i = 1; i <= 20; i++) {
            console.log(i);
        }

        // div by 2
        for (let i = 1; i <= 20; i++) {
            if (i % 2 === 0) {
                console.log("Even");
            }
        }

        // div by 3
        for (let i = 1; i <= 20; i++) {
            if (i % 3 === 0) {
                console.log("Multiple of 3");
            }
        }

        // div by both
        for (let i = 1; i <= 20; i++) {
            if (i % 2 === 0 && i % 3 === 0) {
                console.log("Even & Multiple of 3");
            }
        }

        //skip num 13 continue
        for (let i = 1; i <= 20; i++) {
            if (i === 13) {
                continue;
            }
            console.log(i);
        }
    </script>
</body>
</html>
