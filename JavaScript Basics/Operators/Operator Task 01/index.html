<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for (let i = 1; i <= 20; i++) {
            console.log(i);

            if(i === 13) {
                continue;
            }

            if (i % 2 === 0 && i % 3 === 0) {
                console.log(i + "Even & Multiple of 3");
            }

            if (i % 2 === 0) {
                console.log(i + "Even");
            }

            if (i % 3 === 0) {
                console.log(i + "Multiple of 3");
            } else {
                console.log(i);
            }
        }
    </script>
</body>
</html>
