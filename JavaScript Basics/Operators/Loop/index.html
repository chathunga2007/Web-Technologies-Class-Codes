<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //For Loop
        for (let i = 0; i < 5; i++) {
            console.log(i);
        }

        //While Loop
        let i = 1;
        while(i <= 5) {
            console.log(i);
            i++;
        }

        //Do While Loop
        let a = 1;
        do {
            console.log(a);
            a++;
        } while(a <= 5);

        //Loop Control Statements
        //Break Statement
        for (let i = 0; i < 10; i++) {
            if (i === 5) {
                break;
            }
            console.log(i);
        }

        //Continue Statement
        for (let i = 0; i < 10; i++) {
            if (i % 2 === 0) {
                continue;
            }
            console.log(i);
        }
    </script>
</body>
</html>
