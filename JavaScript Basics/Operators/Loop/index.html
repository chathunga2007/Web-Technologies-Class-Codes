<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //For Loop
        for (let i = 0; i < 5; i++) {
            console.log(i);
        }

        //While Loop
        let i = 1;
        while(i <= 5) {
            console.log(i);
            i++;
        }
    </script>
</body>
</html>
